name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Foundry (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

  bot:
    name: Bot (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Test
        run: npm test

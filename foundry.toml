[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.30"
optimizer = true
optimizer_runs = 1
via_ir = true

remappings = [
  "forge-std/=lib/forge-std/src/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[profile.ci]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30"
optimizer = true
optimizer_runs = 1
via_ir = true
fuzz = false
verbosity = 4
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[fmt]
line_length = 120
